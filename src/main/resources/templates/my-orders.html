<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои заказы | KFC</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="top-bar">
    <div class="nav-logo"><a href="/"> KFC</a></div>
    <div class="top-links">
        <a href="/">Главная</a>
        <a href="/menu">Меню</a>
        <a href="/cart" class="cart-link">🛒 Корзина</a>
        <span th:text="${username}" class="username-badge"></span>
        <a href="/logout" class="btn-logout">Выйти</a>
    </div>
</nav>

<div class="section">
    <h2>📋 Мои заказы</h2>

    <div th:if="${orders.isEmpty()}" class="empty-cart">
        <p>У вас ещё нет заказов</p>
        <a href="/menu" class="view-btn">Перейти в меню</a>
    </div>

    <div th:each="order : ${orders}" class="order-card">
        <div class="order-header">
            <span><b>Заказ #<span th:text="${order.id}"></span></b></span>
            <span th:text="${order.orderDate}"></span>
            <span class="order-status" th:text="${order.status}"
                  th:classappend="${order.status == 'NEW' ? ' status-new' :
                                   order.status == 'PROCESSING' ? ' status-processing' : ' status-done'}"></span>
            <span><b th:text="${order.total} + ' ₸'"></b></span>
        </div>
        <div class="order-items" th:if="${!order.items.isEmpty()}">
            <div th:each="item : ${order.items}" class="order-item-row">
                <span th:text="${item.productName}"></span>
                <span>x<span th:text="${item.quantity}"></span></span>
                <span th:text="${item.price * item.quantity} + ' ₸'"></span>
            </div>
        </div>
        <!-- Демонстрируем полиморфный метод getSummary() через OOP -->
        <div class="order-summary-line" th:text="${order.orderSummary}"></div>
    </div>
</div>

<footer>
    <div class="footer-columns">
        <div class="col">
            <h4>Аккаунт</h4>
            <a th:if="${username}" href="/profile">Информация о профиле</a>
            <a th:if="${username}" href="/my-orders">Мои заказы</a>
            <a th:if="${username}" href="/logout">Выйти</a>
            <a th:unless="${username}" href="/login">Войти</a>
            <a th:unless="${username}" href="/register">Регистрация</a>
        </div>
        <div class="social">
            <a href="https://www.instagram.com/kfc_kazakhstan" target="_blank" style="color:#ccc; text-decoration:none;">Instagram</a>
            &nbsp;&nbsp;
            <a href="https://www.facebook.com/KFCKazakhstan" target="_blank" style="color:#ccc; text-decoration:none;">Facebook</a>
        </div>
    </div>
    <div class="copyright">© 2024 KFC Kazakhstan</div>
</footer>
</body>
</html>
