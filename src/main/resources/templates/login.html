<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход | KFC</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="top-bar">
    <div class="nav-logo"><a href="/">🍗 KFC</a></div>
    <div class="top-links">
        <a href="/">Главная</a>
        <a href="/menu">Меню</a>
        <a href="/login" class="btn-login">Войти</a>
    </div>
</nav>

<div class="auth-wrapper">
    <div class="auth-container">
        <div class="auth-logo">🍗</div>
        <h2>Вход в аккаунт</h2>
        <div th:if="${param.registered}" class="alert alert-success">Регистрация успешна! Войдите.</div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <form method="post" action="/login">
            <input type="text" name="username" placeholder="Логин" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
        <p>Нет аккаунта? <a href="/register">Зарегистрируйтесь</a></p>
        <p class="hint">Тестовый admin: <b>admin / admin123</b></p>
    </div>
</div>
</body>
</html>
